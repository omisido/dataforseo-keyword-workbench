name: Bug report
description: Report a reproducible problem in Keyword Workbench
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Never include API credentials, authorization headers or private keyword data.
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Operating system and Node.js version
      placeholder: macOS 15, Node.js 22
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
